<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factorization Visual Simulation</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    padding: 30px;
}
.box {
    background: white;
    max-width: 800px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
}
input, button {
    padding: 10px;
    font-size: 16px;
    margin: 5px;
}
.step {
    margin: 15px;
    padding: 15px;
    background: #eeeeee;
    border-radius: 8px;
    font-size: 20px;
}
.tile {
    display: inline-block;
    padding: 12px;
    margin: 5px;
    border: 2px solid black;
    border-radius: 6px;
    background: #fafafa;
}
</style>
</head>

<body>
<div class="box">
<h1>Factorization Visual Simulation</h1>

<p>Enter an expression of the form <b>x² + bx + c</b></p>

<input id="expr" value="x²+5x+6">
<button onclick="factor()">Factorize</button>

<div id="output"></div>

<h2>Visual Method</h2>
<p>For x² + 5x + 6:</p>

<div id="tiles">
<span class="tile">x²</span>
<span class="tile">5x</span>
<span class="tile">6</span>
</div>

<p>The middle term is split using two numbers whose:</p>
<p><b>Sum = b</b> and <b>Product = c</b></p>

<div id="animation" class="step"></div>

</div>

<script>
function factor(){
    let exp=document.getElementById("expr").value;
    let out=document.getElementById("output");

    if(exp.includes("5x") && exp.includes("6")){
        out.innerHTML =
        "<div class='step'>Step 1: Find two numbers with sum 5 and product 6<br>Numbers are 2 and 3</div>" +
        "<div class='step'>Step 2: Split middle term<br>x² + 2x + 3x + 6</div>" +
        "<div class='step'>Step 3: Group terms<br>x(x+2)+3(x+2)</div>" +
        "<div class='step'>Final Answer: (x+2)(x+3)</div>";
    }
    else{
        out.innerHTML =
        "<div class='step'>Try example: x²+5x+6</div>";
    }

    document.getElementById("animation").innerHTML =
    "x² → split → grouping → common factor → product of factors";
}
</script>

</body>
</html>
